<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request a Consultation — Stonecraft LLC</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2040%2040'%3E%3Crect%20width='40'%20height='40'%20fill='%231A1E28'/%3E%3Ctext%20x='0'%20y='36'%20font-family='Georgia,serif'%20font-size='38'%20font-weight='700'%20fill='%23F5F0E8'%20opacity='0.9'%3ES%3C/text%3E%3Ctext%20x='14'%20y='36'%20font-family='Georgia,serif'%20font-size='38'%20font-weight='700'%20fill='none'%20stroke='%23C4955A'%20stroke-width='1.2'%3EC%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --slate:  #2C3040;
  --gold:   #C4955A;
  --gold-lt:#D9AF7A;
  --cream:  #F5F0E8;
  --gray:   #8C8C85;
  --dark:   #1A1E28;
}
html, body { height: 100%; }
body {
  font-family: 'Inter', sans-serif;
  font-weight: 300;
  background: var(--dark);
  color: var(--slate);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}
a { text-decoration: none; color: inherit; }

nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.25rem 3rem;
  background: var(--dark);
  border-bottom: 1px solid rgba(196,149,90,0.15);
  flex-shrink: 0;
}
.nav-logo { display: flex; align-items: center; gap: 12px; }
.nav-monogram svg { width: 36px; height: 36px; display: block; }
.nav-wordmark {
  font-family: 'Cormorant Garamond', serif;
  font-size: 16px; font-weight: 600;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--cream);
}
.nav-back {
  font-size: 10.5px; font-weight: 500; letter-spacing: 0.16em;
  text-transform: uppercase;
  padding: 0.6rem 1.25rem;
  border: 1px solid var(--gold);
  color: var(--gold);
  transition: background 0.2s, color 0.2s;
}
.nav-back:hover { background: var(--gold); color: var(--dark); }

.page-header {
  text-align: center;
  padding: 3rem 1.5rem 2rem;
  background: var(--dark);
  flex-shrink: 0;
}
.page-eyebrow {
  font-size: 10px; font-weight: 500; letter-spacing: 0.28em;
  text-transform: uppercase; color: var(--gold);
  margin-bottom: 1rem;
}
.page-header h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(2.25rem, 4vw, 3.25rem);
  font-weight: 300; color: var(--cream);
  margin-bottom: 0.75rem;
}
.page-header p {
  font-size: 14px; color: var(--gray); max-width: 480px; margin: 0 auto;
  line-height: 1.7;
}

.form-wrap {
  flex: 1;
  background: var(--cream);
  min-height: 640px;
  position: relative;
}
.form-wrap iframe {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  border: 0;
}
.fallback-link {
  text-align: center;
  padding: 1.5rem;
  background: var(--dark);
  font-size: 11px; letter-spacing: 0.1em; color: var(--gray);
  flex-shrink: 0;
}
.fallback-link a {
  color: var(--gold); border-bottom: 1px solid rgba(196,149,90,0.4);
}

footer {
  background: var(--dark);
  padding: 1.5rem 3rem;
  text-align: center;
  font-size: 10px; color: rgba(140,140,133,0.5);
  letter-spacing: 0.08em;
  flex-shrink: 0;
}

@media (max-width: 700px) {
  nav { padding: 1rem 1.5rem; }
  .page-header { padding: 2.5rem 1.25rem 1.5rem; }
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">
    <div class="nav-monogram">
      <svg viewBox="0 0 40 40" fill="none">
        <text x="0" y="36" font-family="Georgia,serif" font-size="38" font-weight="700" fill="#F5F0E8" opacity="0.9">S</text>
        <text x="14" y="36" font-family="Georgia,serif" font-size="38" font-weight="700" fill="none" stroke="#C4955A" stroke-width="1.2">C</text>
      </svg>
    </div>
    <span class="nav-wordmark">Stonecraft</span>
  </a>
  <a href="index.html" class="nav-back">&larr; Back to Site</a>
</nav>

<div class="page-header">
  <div class="page-eyebrow">Get in Touch</div>
  <h1>Request a Consultation</h1>
  <p>Tell us a bit about your project and we'll follow up to schedule a visit to our showroom and slab yard.</p>
</div>

<div class="form-wrap">
  <iframe src="https://form.typeform.com/to/oapRk4mn" title="Stonecraft Consultation Request Form" allow="camera; microphone; autoplay; encrypted-media;"></iframe>
</div>

<div class="fallback-link">
  Form not loading? <a href="https://form.typeform.com/to/oapRk4mn" target="_blank" rel="noopener">Open it in a new tab</a>
</div>

<footer>© 2026 Stonecraft LLC · All Rights Reserved</footer>

</body>
</html>
